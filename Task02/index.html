<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Showcase Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="gallery-container">
        <h2>Featured Products</h2>
        
        <div class="image-box">
            <img src="https://picsum.photos/id/20/600/400" id="mainImage" alt="Product">
            <div id="caption" class="caption">High-End Desktop Setup</div>
        </div>

        <div class="controls">
            <button id="prevBtn">« Previous</button>
            <button id="nextBtn">Next »</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
