<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <h2>Create Account</h2>
        <form id="registrationForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="At least 5 characters">
                <small class="error-msg">Username is too short</small>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="example@store.com">
                <small class="error-msg">Please enter a valid email</small>
            </div>

            <button type="submit">Register</button>
        </form>

        <div id="successMessage" class="hidden">
            <h3>✅ Success!</h3>
            <p>Your account has been created successfully.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
